<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>発注書作成</title>
<style>
body{margin:0;background:#f3f4f6;font-family:Arial,"Yu Gothic",sans-serif;color:#111}.container{max-width:1280px;margin:24px auto;padding:16px}.panel,#printArea{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 10px #0001;margin-bottom:20px}#printArea,#completedListArea{display:none}.grid{display:grid;gap:12px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}.g5{grid-template-columns:repeat(5,1fr)}label{display:block;font-size:13px;font-weight:bold;margin-bottom:6px}input,select,textarea{width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:16px;min-height:44px;background:#fff}textarea{min-height:90px}.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}button{border:0;border-radius:8px;padding:10px 16px;font-size:16px;font-weight:bold;cursor:pointer;min-height:44px}.btn-primary{background:#2563eb;color:#fff}.btn-secondary{background:#e5e7eb}.btn-danger{background:#dc2626;color:#fff}.btn-print{background:#16a34a;color:#fff}.line-items{display:flex;flex-direction:column;gap:12px}.line-item{border:1px solid #e5e7eb;border-radius:10px;background:#fafafa;padding:12px}.line-item-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.helper-text{font-size:12px;color:#666}.sheet-title{text-align:center;font-size:24px;font-weight:bold;margin-bottom:12px}.sheet-subtitle{text-align:center;font-size:12px;color:#555;margin-bottom:20px}.sheet-flex{display:flex;gap:16px;align-items:flex-start}.sheet-main{flex:1}.sheet-side{width:220px;flex-shrink:0}.photo-box{border:1px solid #111;height:260px;display:flex;align-items:center;justify-content:center;background:#fafafa;overflow:hidden}.photo-box img{width:100%;height:100%;object-fit:contain;display:none}.table-scroll{overflow-x:auto}.sheet-table{width:100%;min-width:720px;border-collapse:collapse;table-layout:fixed;font-size:12px}.sheet-table th,.sheet-table td{border:1px solid #111;padding:6px 8px;vertical-align:top;word-break:break-word}.yellow{background:#ffe45c!important;font-weight:bold;text-align:center}
*{
  -webkit-print-color-adjust: exact !important;
  print-color-adjust: exact !important;
}.right{text-align:right}.center{text-align:center}.section-gap{height:12px}.toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;padding:10px 14px;border-radius:8px;font-size:13px;display:none;z-index:9999}.completed-list-header{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}.completed-order-list{display:flex;flex-direction:column;gap:12px}.completed-order-card{border:1px solid #e5e7eb;border-radius:12px;background:#fff;padding:14px;box-shadow:0 1px 6px #0001}.completed-order-check{display:flex;gap:10px}.completed-order-check input[type=checkbox]{width:22px;min-height:22px;flex-shrink:0}.completed-order-body{flex:1}.completed-order-title{font-weight:bold;font-size:16px;margin-bottom:6px}.completed-order-meta{color:#666;font-size:13px;line-height:1.5}.empty-list{color:#666;background:#fff;border:1px dashed #d1d5db;border-radius:12px;padding:18px;text-align:center}
@media(max-width:767px){.container{margin:0;padding:10px}.panel,#printArea{border-radius:0;padding:14px}.g2,.g3,.g4,.g5{grid-template-columns:1fr}.sheet-flex{flex-direction:column}.sheet-side{width:100%}.photo-box{height:180px}.btn-row{flex-direction:column}.btn-row button{width:100%}h1{font-size:22px}h2{font-size:18px}.sheet-title{font-size:20px}}
@media(min-width:768px) and (max-width:1024px){.container{margin:0;padding:14px}.g2,.g3,.g4,.g5{grid-template-columns:1fr 1fr}.sheet-flex{flex-direction:column}.sheet-side{width:100%}.photo-box{height:220px}.btn-row button{flex:1 1 calc(50% - 10px)}}
@media print{body{background:#fff}.no-print{display:none!important}#printArea{display:block!important;box-shadow:none;border-radius:0;padding:0;width:100%}.container{max-width:none;margin:0;padding:0;width:100%}.sheet-flex{flex-direction:row!important}.sheet-side{width:220px!important}.photo-box{height:260px!important}.table-scroll{overflow:visible}.sheet-table{min-width:0;width:100%;font-size:11px}.sheet-table th,.sheet-table td{padding:5px 6px}.yellow{
        background:#ffe45c!important;
        -webkit-print-color-adjust:exact!important;
        print-color-adjust:exact!important;
      }@page{size:A4 landscape;margin:8mm}}
</style>
</head>
<body>
<div class="container">
  <div id="formArea" class="panel no-print">
    <h1>発注書 作成フォーム</h1>
    <p class="helper-text">スマホでは帳票部分が横スクロールできます</p>

    <div class="grid g3" style="margin-bottom:16px">
      <div><label for="draftName">下書き名</label><input id="draftName" placeholder="例：3月追加発注_シアートップス"></div>
      <div><label for="draftList">保存済み下書き</label><select id="draftList"><option value="">下書きを選択</option></select></div>
      <div><label>&nbsp;</label><button class="btn-secondary" type="button" onclick="loadSelectedDraft()">選択した下書きを読込</button></div>
    </div>

    <div class="btn-row" style="margin-bottom:16px">
      <button class="btn-secondary" type="button" onclick="showCompletedOrderList()">作成済み発注書一覧を見る</button>
    </div>

    <div class="grid g4">
      <div><label>自社名</label><input id="companyName" value="株式会社アンティローザ" readonly></div>
      <div><label>取引先名</label><input id="supplierName" placeholder="例：株式会社〇〇"></div>
      <div><label>発注日</label><input id="orderDate" type="date"></div>
      <div><label>担当者</label><input id="staffName" placeholder="例：田丸 さやか"></div>
    </div>

    <div class="grid g5" style="margin-top:12px">
      <div><label>納期（月）</label><select id="deliveryMonth"><option value="">選択してください</option><option>1月</option><option>2月</option><option>3月</option><option>4月</option><option>5月</option><option>6月</option><option>7月</option><option>8月</option><option>9月</option><option>10月</option><option>11月</option><option>12月</option></select></div>
      <div><label>納期（時期）</label><select id="deliveryTerm"><option value="">選択してください</option><option>上旬</option><option>中旬</option><option>下旬</option></select></div>
      <div><label>納品先</label><select id="shipTo"><option value="">選択してください</option><option>岐阜商品センター</option><option>アクラ倉庫</option><option>本社</option></select></div>
      <div><label>仕入れ先品番</label><input id="supplierCode" placeholder="例：ABC-1234"></div>
      <div><label>商品画像</label><input id="productImage" type="file" accept="image/*"></div>
    </div>

    <div class="grid g4" style="margin-top:12px">
      <div><label>品名</label><input id="itemName" placeholder="例：シアータンクトップ"></div>
      <div><label>基準単価</label><input id="basePrice" type="number" min="0" placeholder="例：1200"></div>
      <div><label>上代</label><input id="itemRetail" type="number" min="0" placeholder="例：3900"></div>
      <div><label>原価率</label><input id="itemRate" readonly placeholder="基準単価と上代から自動計算"></div>
    </div>

    <div class="grid g2" style="margin-top:12px">
      <div><label>平均単価</label><input id="avgPrice" readonly placeholder="基準単価または明細平均"></div>
      <div><label>備考</label><textarea id="remarks" placeholder="備考を入力"></textarea></div>
    </div>

    <div class="section-gap"></div>
    <h2>明細</h2>
    <div id="lineItems" class="line-items"></div>

    <div class="btn-row">
      <button class="btn-secondary" type="button" onclick="addLineItem()">＋ 明細を追加</button>
      <button class="btn-secondary" type="button" onclick="saveDraft()">下書き保存</button>
      <button class="btn-secondary" type="button" onclick="deleteSelectedDraft()">選択した下書きを削除</button>
      <button class="btn-primary" type="button" onclick="generateSheet()">発注書を作成</button>
    </div>
  </div>

  <div id="completedListArea" class="panel no-print">
    <div class="completed-list-header">
      <div><h1 style="margin-bottom:4px">作成済み発注書一覧</h1><p class="helper-text" style="margin:0">作成から30日間保存されます</p></div>
      <div class="btn-row" style="margin-top:0">
        <button class="btn-secondary" type="button" onclick="downloadSelectedCompletedOrdersCSV()">選択分をまとめてCSV出力</button>
        <button class="btn-secondary" type="button" onclick="selectAllCompletedOrders(true)">すべて選択</button>
        <button class="btn-secondary" type="button" onclick="selectAllCompletedOrders(false)">選択解除</button>
        <button class="btn-secondary" type="button" onclick="hideCompletedOrderList()">入力画面に戻る</button>
      </div>
    </div>
    <div id="completedOrderCards" class="completed-order-list"></div>
  </div>

  <div id="printArea">
    <div class="sheet-title">ORDER SHEET</div>
    <div class="sheet-subtitle">発注内容確認書</div>
    <div class="sheet-flex">
      <div class="sheet-main">
        <div class="table-scroll">
          <table class="sheet-table">
            <colgroup><col style="width:14%"><col style="width:36%"><col style="width:14%"><col style="width:36%"></colgroup>
            <tr><th class="yellow">自社名</th><td id="outCompanyName"></td><th class="yellow">取引先名</th><td id="outSupplierName"></td></tr>
            <tr><th class="yellow">発注日</th><td id="outOrderDate"></td><th class="yellow">納期</th><td id="outDelivery"></td></tr>
            <tr><th class="yellow">担当者</th><td id="outStaffName"></td><th class="yellow">納品先</th><td id="outShipTo"></td></tr>
            <tr><th class="yellow">仕入れ先品番</th><td id="outSupplierCode"></td><th class="yellow">品名</th><td id="outItemName"></td></tr>
            <tr><th class="yellow">平均単価</th><td id="outAvgPrice" class="right"></td><th class="yellow">原価率</th><td id="outRate"></td></tr>
            <tr><th class="yellow">基準単価</th><td id="outBasePrice" class="right"></td><th class="yellow">上代</th><td id="outItemRetail" class="right"></td></tr>
          </table>
        </div>
      </div>
      <div class="sheet-side">
        <div class="photo-box"><img id="outImage" alt="商品画像"><div id="photoPlaceholder" class="photo-placeholder">商品画像なし</div></div>
      </div>
    </div>

    <div class="section-gap"></div>
    <div class="table-scroll">
      <table class="sheet-table">
        <colgroup><col style="width:22%"><col style="width:14%"><col style="width:20%"><col style="width:14%"><col style="width:15%"><col style="width:15%"></colgroup>
        <thead><tr><th class="yellow">カラー</th><th class="yellow">サイズ</th><th class="yellow">メモ</th><th class="yellow">数量</th><th class="yellow">単価</th><th class="yellow">金額</th></tr></thead>
        <tbody id="outLineItems"></tbody>
        <tfoot><tr><th colspan="3" class="right">合計</th><th id="outTotalQty" class="right"></th><th></th><th id="outGrandTotal" class="right"></th></tr></tfoot>
      </table>
    </div>

    <div class="section-gap"></div>
    <div class="table-scroll"><table class="sheet-table"><tr><th class="yellow" style="width:14%">備考</th><td id="outRemarks"></td></tr></table></div>

    <div class="btn-row no-print" style="margin-top:20px">
      <button class="btn-secondary" onclick="backToEdit()">入力に戻る</button>
      <button class="btn-print" onclick="window.print()">PDF保存 / 印刷</button>
      <button class="btn-secondary" onclick="downloadCSV()">CSVダウンロード</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let uploadedImageData = "";
let lineItemCount = 0;
const DRAFTS_KEY = "orderDrafts_v2";
const COMPLETED_ORDERS_KEY = "completedOrders_v1";
const COMPLETED_ORDER_RETENTION_DAYS = 30;

function formatNumber(value) { return Number(value || 0).toLocaleString("ja-JP"); }
function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.style.display = "block";
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => toast.style.display = "none", 1800);
}
function esc(value) {
  return String(value ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}
function csvEscape(value) {
  const text = String(value ?? "");
  return `"${text.replace(/"/g, '""')}"`;
}

function calculateOrderSummary({ basePrice, itemRetail, lineItems }) {
  let totalQty = 0, grandTotal = 0, hasDifferentPrice = false;
  lineItems.forEach(item => {
    const qty = Number(item.qty || 0);
    const price = Number(item.price || 0);
    totalQty += qty;
    grandTotal += qty * price;
    if (qty > 0 && price > 0 && basePrice > 0 && price !== basePrice) hasDifferentPrice = true;
  });
  const avgPrice = totalQty > 0 ? grandTotal / totalQty : 0;
  const costPrice = hasDifferentPrice && avgPrice > 0 ? avgPrice : basePrice;
  const itemRate = costPrice > 0 && itemRetail > 0 ? ((costPrice / itemRetail) * 100).toFixed(1) + "%" : "";
  return { totalQty, grandTotal, avgPrice, costPrice, itemRate };
}

function collectLineItems() {
  const rows = document.querySelectorAll(".line-item");
  const items = [];
  rows.forEach(row => {
    const item = {
      color: row.querySelector(".line-color").value.trim(),
      size: row.querySelector(".line-size").value.trim(),
      memo: row.querySelector(".line-memo").value.trim(),
      qty: Number(row.querySelector(".line-qty").value || 0),
      price: Number(row.querySelector(".line-price").value || 0)
    };
    if (item.color || item.size || item.memo || item.qty || item.price) items.push(item);
  });
  return items;
}

function calculateSummaryFromLines() {
  const basePrice = Number(document.getElementById("basePrice").value || 0);
  const itemRetail = Number(document.getElementById("itemRetail").value || 0);
  const summary = calculateOrderSummary({ basePrice, itemRetail, lineItems: collectLineItems() });
  document.getElementById("avgPrice").value = summary.costPrice > 0 ? summary.costPrice.toFixed(1) : "";
  document.getElementById("itemRate").value = summary.itemRate;
}

function applyBasePriceToLines() {
  const basePrice = document.getElementById("basePrice").value;
  document.querySelectorAll(".line-price").forEach(input => {
    if (input.dataset.edited !== "true") input.value = basePrice;
  });
  calculateSummaryFromLines();
}

function addLineItem(defaults = {}) {
  lineItemCount += 1;
  const currentBasePrice = document.getElementById("basePrice") ? document.getElementById("basePrice").value : "";
  const defaultPrice = defaults.price ?? currentBasePrice ?? "";
  const isEdited = String(defaults.price ?? "") && String(defaults.price) !== String(currentBasePrice);
  const row = document.createElement("div");
  row.className = "line-item";
  row.dataset.lineId = String(lineItemCount);
  row.innerHTML = `
    <div class="line-item-head">
      <strong>明細 ${lineItemCount}</strong>
      <button class="btn-danger" type="button" onclick="removeLineItem(${lineItemCount})">削除</button>
    </div>
    <div class="grid g5">
      <div><label>カラー</label><input class="line-color" value="${esc(defaults.color)}" placeholder="例：IVORY"></div>
      <div><label>サイズ</label><input class="line-size" value="${esc(defaults.size)}" placeholder="例：FREE"></div>
      <div><label>メモ</label><input class="line-memo" value="${esc(defaults.memo)}" placeholder="例：修正あり"></div>
      <div><label>数量</label><input class="line-qty" type="number" min="0" value="${esc(defaults.qty)}" placeholder="例：40"></div>
      <div><label>単価</label><input class="line-price" type="number" min="0" data-edited="${isEdited ? "true" : "false"}" value="${esc(defaultPrice)}" placeholder="例：1200"></div>
    </div>`;
  document.getElementById("lineItems").appendChild(row);
  row.querySelector(".line-qty").addEventListener("input", calculateSummaryFromLines);
  row.querySelector(".line-price").addEventListener("input", e => {
    e.target.dataset.edited = "true";
    calculateSummaryFromLines();
  });
}

function removeLineItem(id) {
  const el = document.querySelector(`[data-line-id="${id}"]`);
  if (el) el.remove();
  calculateSummaryFromLines();
}

function getAllDrafts() {
  const saved = localStorage.getItem(DRAFTS_KEY);
  return saved ? JSON.parse(saved) : {};
}
function saveAllDrafts(drafts) { localStorage.setItem(DRAFTS_KEY, JSON.stringify(drafts)); }
function getDraftName() {
  const inputName = document.getElementById("draftName").value.trim();
  if (inputName) return inputName;
  const supplierName = document.getElementById("supplierName").value.trim();
  const itemName = document.getElementById("itemName").value.trim();
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}_${supplierName || "取引先未入力"}_${itemName || "商品名未入力"}`;
}
function getFormData() {
  return {
    draftName: document.getElementById("draftName").value,
    supplierName: document.getElementById("supplierName").value,
    orderDate: document.getElementById("orderDate").value,
    staffName: document.getElementById("staffName").value,
    deliveryMonth: document.getElementById("deliveryMonth").value,
    deliveryTerm: document.getElementById("deliveryTerm").value,
    shipTo: document.getElementById("shipTo").value,
    supplierCode: document.getElementById("supplierCode").value,
    itemName: document.getElementById("itemName").value,
    basePrice: document.getElementById("basePrice").value,
    itemRetail: document.getElementById("itemRetail").value,
    remarks: document.getElementById("remarks").value,
    lineItems: collectLineItems(),
    uploadedImageData: uploadedImageData || ""
  };
}
function setFormData(data) {
  document.getElementById("draftName").value = data.draftName || "";
  document.getElementById("supplierName").value = data.supplierName || "";
  document.getElementById("orderDate").value = data.orderDate || "";
  document.getElementById("staffName").value = data.staffName || "";
  document.getElementById("deliveryMonth").value = data.deliveryMonth || "";
  document.getElementById("deliveryTerm").value = data.deliveryTerm || "";
  document.getElementById("shipTo").value = data.shipTo || "";
  document.getElementById("supplierCode").value = data.supplierCode || "";
  document.getElementById("itemName").value = data.itemName || "";
  document.getElementById("basePrice").value = data.basePrice || "";
  document.getElementById("itemRetail").value = data.itemRetail || "";
  document.getElementById("remarks").value = data.remarks || "";
  document.getElementById("lineItems").innerHTML = "";
  lineItemCount = 0;
  if (data.lineItems && data.lineItems.length > 0) data.lineItems.forEach(item => addLineItem(item));
  else addLineItem();
  uploadedImageData = data.uploadedImageData || "";
  calculateSummaryFromLines();
  refreshDraftImagePreview();
}
function refreshDraftList(selectedName = "") {
  const draftList = document.getElementById("draftList");
  if (!draftList) return;
  const drafts = getAllDrafts();
  draftList.innerHTML = `<option value="">下書きを選択</option>`;
  Object.keys(drafts)
    .sort((a,b) => (drafts[b].savedAt || "").localeCompare(drafts[a].savedAt || ""))
    .forEach(name => {
      const option = document.createElement("option");
      option.value = name;
      const savedAt = drafts[name].savedAt ? new Date(drafts[name].savedAt).toLocaleString("ja-JP") : "";
      option.textContent = savedAt ? `${name}（${savedAt}）` : name;
      if (name === selectedName) option.selected = true;
      draftList.appendChild(option);
    });
}
function saveDraft(showMessage = true) {
  const drafts = getAllDrafts();
  const name = getDraftName();
  drafts[name] = { ...getFormData(), draftName: name, savedAt: new Date().toISOString() };
  saveAllDrafts(drafts);
  document.getElementById("draftName").value = name;
  refreshDraftList(name);
  if (showMessage) showToast("下書きを保存しました");
}
function loadSelectedDraft(showMessage = true) {
  const name = document.getElementById("draftList").value;
  if (!name) { if (showMessage) showToast("読み込む下書きを選択してください"); return; }
  const data = getAllDrafts()[name];
  if (!data) { if (showMessage) showToast("下書きが見つかりません"); return; }
  setFormData(data);
  document.getElementById("draftName").value = name;
  if (showMessage) showToast("下書きを読み込みました");
}
function deleteSelectedDraft() {
  const name = document.getElementById("draftList").value;
  if (!name) { showToast("削除する下書きを選択してください"); return; }
  if (!confirm(`「${name}」を削除しますか？`)) return;
  const drafts = getAllDrafts();
  delete drafts[name];
  saveAllDrafts(drafts);
  refreshDraftList();
  showToast("下書きを削除しました");
}

function getAllCompletedOrders() {
  const saved = localStorage.getItem(COMPLETED_ORDERS_KEY);
  return saved ? JSON.parse(saved) : {};
}
function saveAllCompletedOrders(orders) { localStorage.setItem(COMPLETED_ORDERS_KEY, JSON.stringify(orders)); }
function purgeExpiredCompletedOrders() {
  const orders = getAllCompletedOrders();
  const now = Date.now();
  const limit = COMPLETED_ORDER_RETENTION_DAYS * 24 * 60 * 60 * 1000;
  let changed = false;
  Object.keys(orders).forEach(id => {
    const createdAt = new Date(orders[id].createdAt || 0).getTime();
    if (!createdAt || now - createdAt > limit) { delete orders[id]; changed = true; }
  });
  if (changed) saveAllCompletedOrders(orders);
}
function getCompletedOrderTitle(data) {
  return `${data.orderDate || "日付未入力"}_${data.supplierName || "取引先未入力"}_${data.itemName || "商品名未入力"}`;
}
function saveCompletedOrder() {
  purgeExpiredCompletedOrders();
  const orders = getAllCompletedOrders();
  const data = getFormData();
  const id = `order_${Date.now()}`;
  orders[id] = { ...data, id, title: getCompletedOrderTitle(data), createdAt: new Date().toISOString() };
  saveAllCompletedOrders(orders);
  refreshCompletedOrderList();
}
function refreshCompletedOrderList() {
  purgeExpiredCompletedOrders();
  renderCompletedOrderCards();
}
function showCompletedOrderList() {
  document.getElementById("formArea").style.display = "none";
  document.getElementById("printArea").style.display = "none";
  document.getElementById("completedListArea").style.display = "block";
  renderCompletedOrderCards();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function hideCompletedOrderList() {
  document.getElementById("completedListArea").style.display = "none";
  document.getElementById("printArea").style.display = "none";
  document.getElementById("formArea").style.display = "block";
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function renderCompletedOrderCards() {
  const container = document.getElementById("completedOrderCards");
  if (!container) return;
  purgeExpiredCompletedOrders();
  const orders = getAllCompletedOrders();
  const ids = Object.keys(orders).sort((a,b) => (orders[b].createdAt || "").localeCompare(orders[a].createdAt || ""));
  if (ids.length === 0) { container.innerHTML = `<div class="empty-list">作成済み発注書はありません。</div>`; return; }
  container.innerHTML = "";
  ids.forEach(id => {
    const order = orders[id];
    const createdAt = order.createdAt ? new Date(order.createdAt).toLocaleString("ja-JP") : "";
    const card = document.createElement("div");
    card.className = "completed-order-card";
    card.innerHTML = `
      <div class="completed-order-check">
        <input type="checkbox" class="completed-order-checkbox" value="${esc(id)}" aria-label="発注書を選択">
        <div class="completed-order-body">
          <div class="completed-order-title">${esc(order.title || "発注書")}</div>
          <div class="completed-order-meta">
            作成日時：${esc(createdAt)}<br>
            取引先：${esc(order.supplierName || "未入力")}<br>
            品名：${esc(order.itemName || "未入力")}
          </div>
          <div class="btn-row" style="margin-top:8px">
            <button class="btn-primary" type="button" onclick="loadCompletedOrderById('${id}')">表示</button>
            <button class="btn-danger" type="button" onclick="deleteCompletedOrderById('${id}')">削除</button>
          </div>
        </div>
      </div>`;
    container.appendChild(card);
  });
}
function loadCompletedOrderById(id) {
  const data = getAllCompletedOrders()[id];
  if (!data) { showToast("発注書が見つかりません"); refreshCompletedOrderList(); return; }
  setFormData(data);
  document.getElementById("completedListArea").style.display = "none";
  generateSheet({ saveHistory: false });
  showToast("作成済み発注書を表示しました");
}
function deleteCompletedOrderById(id) {
  const orders = getAllCompletedOrders();
  const title = orders[id]?.title || id;
  if (!confirm(`「${title}」を削除しますか？`)) return;
  delete orders[id];
  saveAllCompletedOrders(orders);
  renderCompletedOrderCards();
  showToast("作成済み発注書を削除しました");
}
function selectAllCompletedOrders(checked) {
  document.querySelectorAll(".completed-order-checkbox").forEach(checkbox => checkbox.checked = checked);
}
function getSelectedCompletedOrderIds() {
  return Array.from(document.querySelectorAll(".completed-order-checkbox:checked")).map(checkbox => checkbox.value);
}

function refreshDraftImagePreview() {
  const outImage = document.getElementById("outImage");
  const photoPlaceholder = document.getElementById("photoPlaceholder");
  if (uploadedImageData) {
    outImage.src = uploadedImageData;
    outImage.style.display = "block";
    photoPlaceholder.style.display = "none";
  } else {
    outImage.style.display = "none";
    photoPlaceholder.style.display = "block";
  }
}

function generateSheet(options = {}) {
  const shouldSaveHistory = options.saveHistory !== false;
  const companyName = document.getElementById("companyName").value.trim();
  const supplierName = document.getElementById("supplierName").value.trim();
  const orderDate = document.getElementById("orderDate").value;
  const deliveryMonth = document.getElementById("deliveryMonth").value;
  const deliveryTerm = document.getElementById("deliveryTerm").value;
  const staffName = document.getElementById("staffName").value.trim();
  const shipTo = document.getElementById("shipTo").value;
  const supplierCode = document.getElementById("supplierCode").value.trim();
  const itemName = document.getElementById("itemName").value.trim();
  const basePrice = Number(document.getElementById("basePrice").value || 0);
  const itemRetail = Number(document.getElementById("itemRetail").value || 0);
  const remarks = document.getElementById("remarks").value.trim();
  const lineItems = collectLineItems();

  if (!itemName) { alert("商品名を入力してください。"); return; }
  if (lineItems.length === 0) { alert("明細を1行以上入力してください。"); return; }

  const delivery = [deliveryMonth, deliveryTerm].filter(Boolean).join(" ");
  const summary = calculateOrderSummary({ basePrice, itemRetail, lineItems });

  document.getElementById("outCompanyName").textContent = companyName;
  document.getElementById("outSupplierName").textContent = supplierName;
  document.getElementById("outOrderDate").textContent = orderDate;
  document.getElementById("outDelivery").textContent = delivery;
  document.getElementById("outStaffName").textContent = staffName;
  document.getElementById("outShipTo").textContent = shipTo;
  document.getElementById("outSupplierCode").textContent = supplierCode;
  document.getElementById("outItemName").textContent = itemName;
  document.getElementById("outBasePrice").textContent = formatNumber(basePrice);
  document.getElementById("outItemRetail").textContent = formatNumber(itemRetail);
  document.getElementById("outRate").textContent = summary.itemRate;
  document.getElementById("outAvgPrice").textContent = summary.costPrice > 0 ? summary.costPrice.toFixed(1) : "";
  document.getElementById("outRemarks").textContent = remarks;

  const tbody = document.getElementById("outLineItems");
  tbody.innerHTML = "";
  lineItems.forEach(item => {
    const amount = item.qty * item.price;
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="center">${esc(item.color)}</td>
      <td class="center">${esc(item.size)}</td>
      <td>${esc(item.memo)}</td>
      <td class="right">${formatNumber(item.qty)}</td>
      <td class="right">${formatNumber(item.price)}</td>
      <td class="right">${formatNumber(amount)}</td>`;
    tbody.appendChild(tr);
  });

  document.getElementById("outTotalQty").textContent = formatNumber(summary.totalQty);
  document.getElementById("outGrandTotal").textContent = formatNumber(summary.grandTotal);
  refreshDraftImagePreview();
  if (shouldSaveHistory) saveCompletedOrder();
  document.getElementById("formArea").style.display = "none";
  document.getElementById("completedListArea").style.display = "none";
  document.getElementById("printArea").style.display = "block";
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function backToEdit() {
  document.getElementById("formArea").style.display = "block";
  document.getElementById("completedListArea").style.display = "none";
  document.getElementById("printArea").style.display = "none";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function getOrderCsvRows(order) {
  const companyName = "株式会社アンティローザ";
  const supplierName = order.supplierName || "";
  const orderDate = order.orderDate || "";
  const delivery = [order.deliveryMonth, order.deliveryTerm].filter(Boolean).join(" ");
  const staffName = order.staffName || "";
  const shipTo = order.shipTo || "";
  const supplierCode = order.supplierCode || "";
  const itemName = order.itemName || "";
  const basePrice = Number(order.basePrice || 0);
  const itemRetail = Number(order.itemRetail || 0);
  const remarks = order.remarks || "";
  const lineItems = order.lineItems || [];
  const summary = calculateOrderSummary({ basePrice, itemRetail, lineItems });

  return lineItems.map(item => {
    const qty = Number(item.qty || 0);
    const price = Number(item.price || 0);
    const amount = qty * price;
    return [orderDate, companyName, supplierName, staffName, delivery, shipTo, supplierCode, itemName, basePrice, summary.costPrice > 0 ? summary.costPrice.toFixed(1) : "", itemRetail, summary.itemRate, item.color || "", item.size || "", item.memo || "", qty, price, amount, remarks, order.createdAt || ""];
  });
}
function downloadRowsAsCSV(rows, filename) {
  const headers = ["発注日","自社名","取引先名","担当者","納期","納品先","仕入れ先品番","品名","基準単価","平均単価","上代","原価率","カラー","サイズ","メモ","数量","明細単価","金額","備考","発注書作成日時"];
  const csv = [headers, ...rows].map(row => row.map(csvEscape).join(",")).join("\r\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function downloadCSV() {
  const data = getFormData();
  if (!data.itemName) { alert("商品名を入力してください。"); return; }
  const rows = getOrderCsvRows({ ...data, createdAt: new Date().toISOString() });
  if (rows.length === 0) { alert("明細を1行以上入力してください。"); return; }
  downloadRowsAsCSV(rows, `発注書_${data.orderDate || "date"}_${data.supplierName || "supplier"}_${data.itemName || "item"}.csv`);
}
function downloadSelectedCompletedOrdersCSV() {
  const selectedIds = getSelectedCompletedOrderIds();
  if (selectedIds.length === 0) { showToast("CSV出力する発注書を選択してください"); return; }
  const orders = getAllCompletedOrders();
  const rows = [];
  selectedIds.forEach(id => { if (orders[id]) rows.push(...getOrderCsvRows(orders[id])); });
  if (rows.length === 0) { showToast("CSV出力できる明細がありません"); return; }
  const d = new Date();
  downloadRowsAsCSV(rows, `作成済み発注書まとめ_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.csv`);
}

document.getElementById("basePrice").addEventListener("input", () => {
  applyBasePriceToLines();
  calculateSummaryFromLines();
});
document.getElementById("itemRetail").addEventListener("input", calculateSummaryFromLines);
document.getElementById("productImage").addEventListener("change", function(event) {
  const file = event.target.files[0];
  if (!file) { uploadedImageData = ""; return; }
  const reader = new FileReader();
  reader.onload = e => uploadedImageData = e.target.result;
  reader.readAsDataURL(file);
});

const today = new Date();
document.getElementById("orderDate").value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
addLineItem();
addLineItem();
calculateSummaryFromLines();
refreshDraftList();
refreshCompletedOrderList();
</script>
